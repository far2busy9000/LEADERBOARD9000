<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark glossy background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#121312"/>
      <stop offset="100%" stop-color="#050605"/>
    </radialGradient>
    
    <!-- Neon Volt/Emerald Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccff00"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Platinum Highlight Gradient -->
    <linearGradient id="silver-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="50%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Soft glow filter for realistic neon appearance -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle with thick neon border -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="url(#primary-grad)" stroke-width="14" />
  
  <!-- Subtle background grid/target arcs to feel high-precision/GPS -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#1f201f" stroke-width="3" stroke-dasharray="12 18" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="#1f201f" stroke-width="2" stroke-dasharray="6 12" />

  <!-- The Crown + Flag/Hole Fusion Concept -->
  <!-- Sleek Glowing Golf Tee/Ball Base -->
  <path d="M210 380 Q256 425 302 380" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-linecap="round" filter="url(#neon-glow)" />
  <circle cx="256" cy="355" r="14" fill="url(#silver-grad)" />

  <!-- Flagstick splitting up -->
  <line x1="256" y1="341" x2="256" y2="140" stroke="url(#silver-grad)" stroke-width="8" stroke-linecap="round" />

  <!-- Graphic Triangle Flag in Volt Neon SVG -->
  <path d="M256 140 L370 195 L256 250 Z" fill="url(#primary-grad)" filter="url(#neon-glow)" />

  <!-- Star/Glint accent -->
  <path d="M385 130 L390 145 L405 150 L390 155 L385 170 L380 155 L365 150 L380 145 Z" fill="#ffffff" />
  
  <!-- Stylized Leaderboard "9000" Hexagonal Crown floating at top -->
  <path d="M190 135 L215 100 L256 123 L297 100 L322 135 Z" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" filter="url(#neon-glow)" />
</svg>
